    /* =========================
       PAGE BACKGROUND
       change black → white if needed
    ========================== */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      min-height: 100vh;
      position: relative;
    }

    /* =========================
       MAIN TEXT BLOCK POSITION
       ~2 cm from top-left
    ========================== */
    .content {
      margin-top: 1cm;
      margin-left: 1cm;
      max-width: 700px;
    }

    /* title styling */
    h1 {
      color: #67874C;
      font-size: 42px;
      margin-bottom: 30px;
    }

    /* list styling */
    ul {
      list-style: none;
      padding: 0;
      font-size: 20px;
    }

    li {
      margin: 10px 0;
    }

    /* links (kept minimal + clean) */
    a {
      text-decoration: none;
      color: #aaa;
    }

    a:hover {
      color: #67874C;
    }

    /* =========================
       SVG BACKGROUND (STABLE)
       anchored at bottom, no flicker
    ========================== */
    .svg-wrap {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 130%;
      text-align: center;
      opacity: 0.5;
      pointer-events: none;
    }

    /* .svg-wrap img {
      width: 100%;

      object-fit: contain;
      display: block;
    } */
    .svg-wrap img {
  width: 100%;              /* stays inside page width */
  transform: scale(1.1);    /* makes it bigger visually */
  transform-origin: bottom center;
}
  </style>
</head>
